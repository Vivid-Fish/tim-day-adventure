<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim's Data</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #08080f;
  color: #e0e0e8;
  min-height: 100vh;
  padding: 24px 16px 60px;
}
.container { max-width: 640px; margin: 0 auto; }
h1 {
  font-size: 28px; font-weight: 900; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #4af, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 4px;
}
.subtitle { color: rgba(255,255,255,0.3); font-size: 13px; margin-bottom: 28px; }

.tabs { display: flex; gap: 8px; margin-bottom: 24px; }
.tab {
  padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.45);
  transition: all 0.2s; user-select: none;
}
.tab:hover { background: rgba(255,255,255,0.06); }
.tab.active { background: rgba(68,170,255,0.12); border-color: rgba(68,170,255,0.25); color: #4af; }

.section { margin-bottom: 28px; }
.section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.25); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-title .icon { font-size: 14px; }

.stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.stat-card {
  flex: 1; min-width: 85px; padding: 14px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
}
.stat-value { font-size: 30px; font-weight: 900; line-height: 1; }
.stat-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; }
.blue { color: #4af; } .purple { color: #a78bfa; } .green { color: #4ade80; }
.amber { color: #fbbf24; } .rose { color: #fb7185; }

.model-badges { display: flex; gap: 8px; flex-wrap: wrap; }
.badge {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
}
.badge .n { font-weight: 400; opacity: 0.6; }
.badge.gpt4o { background: rgba(16,163,127,0.12); color: #34d399; border: 1px solid rgba(16,163,127,0.15); }
.badge.gpt5 { background: rgba(168,85,247,0.12); color: #c084fc; border: 1px solid rgba(168,85,247,0.15); }
.badge.o3 { background: rgba(251,191,36,0.12); color: #fcd34d; border: 1px solid rgba(251,191,36,0.15); }

.bar-chart { display: flex; flex-direction: column; gap: 5px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { font-size: 12px; color: rgba(255,255,255,0.45); width: 80px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 18px; background: rgba(255,255,255,0.03); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; min-width: 2px; }
.bar-val { font-size: 11px; color: rgba(255,255,255,0.35); width: 28px; flex-shrink: 0; }

.topics { display: flex; flex-wrap: wrap; gap: 6px; }
.topic {
  padding: 4px 11px; border-radius: 10px; font-size: 12px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.55); line-height: 1.3;
}

.timeline { display: flex; flex-direction: column; gap: 6px; }
.tl-item {
  padding: 10px 14px; border-radius: 8px;
  background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05);
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
.tl-title { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-meta { font-size: 11px; color: rgba(255,255,255,0.3); white-space: nowrap; }

.hour-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
.hcell {
  aspect-ratio: 1; border-radius: 3px; display: flex; align-items: center;
  justify-content: center; font-size: 9px; color: rgba(255,255,255,0.25);
}

.plat-row {
  display: flex; gap: 12px; align-items: center; padding: 12px 14px;
  background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px; margin-bottom: 8px;
}
.plat-icon { font-size: 20px; width: 32px; text-align: center; }
.plat-info { flex: 1; }
.plat-name { font-size: 14px; font-weight: 600; }
.plat-detail { font-size: 12px; color: rgba(255,255,255,0.35); }
.plat-stat { font-size: 20px; font-weight: 700; }

.divider { height: 1px; background: rgba(255,255,255,0.05); margin: 24px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>Tim's Digital Footprint</h1>
  <p class="subtitle" id="gen-date"></p>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>
<script>
const D = VANA_DATA_PLACEHOLDER;

document.getElementById('gen-date').textContent = 'Generated from Vana data — ' + new Date(D.generated).toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});

const tabs = ['24h', '7d', 'all'];
const tabLabels = {'24h': 'Last 24h', '7d': 'Last 7 days', 'all': 'All time'};
let activeTab = '24h';

function showTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.t === t));
  render();
}

document.getElementById('tabs').innerHTML = tabs.map(t =>
  `<div class="tab${t==='24h'?' active':''}" data-t="${t}" onclick="showTab('${t}')">${tabLabels[t]}</div>`
).join('');

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

const LC = {Python:'#3572A5',JavaScript:'#f1e05a',TypeScript:'#3178c6',Go:'#00ADD8',Ruby:'#701516',Shell:'#89e051',HTML:'#e34c26',CSS:'#563d7c',HCL:'#844FBA',Dockerfile:'#384d54'};

function render() {
  const el = document.getElementById('content');
  const c = D.chatgpt, g = D.github, y = D.youtube, l = D.linkedin, u = D.uber;
  el.innerHTML = activeTab === '24h' ? r24(c,g) : activeTab === '7d' ? r7(c,g) : rAll(c,g,y,l,u);
}

function r24(c, g) {
  return `
  <div class="section">
    <div class="section-title"><span class="icon">💬</span> ChatGPT — 24 hours</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value blue">${c.last24h}</div><div class="stat-label">conversations started</div></div>
    </div>
    ${c.topics24h.length ? `
      <div class="section-title" style="margin-top:16px"><span class="icon">🧠</span> What you asked about</div>
      <div class="topics">${c.topics24h.map(t=>`<div class="topic">${esc(t)}</div>`).join('')}</div>
    ` : '<p style="font-size:13px;color:rgba(255,255,255,0.35)">No new conversations in the last 24 hours.</p>'}
    <div class="section-title" style="margin-top:20px"><span class="icon">🤖</span> Models used (recent)</div>
    <div class="model-badges">${modelBadges(c.models)}</div>
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title"><span class="icon">🐙</span> GitHub — 24 hours</div>
    <p style="font-size:13px;color:rgba(255,255,255,0.35)">No repo updates in the last 24 hours.</p>
  </div>`;
}

function r7(c, g) {
  const hMax = Math.max(...Object.values(c.hourDist).map(Number), 1);
  return `
  <div class="section">
    <div class="section-title"><span class="icon">💬</span> ChatGPT — 7 days</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value blue">${c.last7d}</div><div class="stat-label">conversations</div></div>
      <div class="stat-card"><div class="stat-value purple">${c.totalMessages}</div><div class="stat-label">messages</div></div>
      <div class="stat-card"><div class="stat-value green">${Object.keys(c.models).length}</div><div class="stat-label">models</div></div>
    </div>
    <div class="model-badges" style="margin-bottom:16px">${modelBadges(c.models)}</div>

    <div class="section-title"><span class="icon">🕐</span> Active hours (UTC)</div>
    <div class="hour-grid" style="margin-bottom:18px">
      ${Array.from({length:24},(_,h)=>{
        const v = Number(c.hourDist[h]||0);
        const int = v/hMax;
        const bg = v>0 ? `rgba(68,170,255,${(.08+int*.55).toFixed(2)})` : 'rgba(255,255,255,0.02)';
        return `<div class="hcell" style="background:${bg}" title="${h}:00 — ${v}">${h}</div>`;
      }).join('')}
    </div>

    <div class="section-title"><span class="icon">🧠</span> Topics</div>
    <div class="topics" style="margin-bottom:18px">${c.topics7d.map(t=>`<div class="topic">${esc(t)}</div>`).join('')}</div>

    <div class="section-title"><span class="icon">📋</span> Recent</div>
    <div class="timeline">${(c.recentConvos7d||[]).slice(0,12).map(cv=>{
      const d = cv.created ? new Date(cv.created) : null;
      const ts = d ? d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : '';
      return `<div class="tl-item"><div class="tl-title">${esc(cv.title)}</div><div class="tl-meta">${cv.messageCount>0?cv.messageCount+' msgs ':''} ${ts}</div></div>`;
    }).join('')}</div>
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title"><span class="icon">🐙</span> GitHub — 7 days</div>
    ${g.active7d.length ? `
      <div class="stats-row"><div class="stat-card"><div class="stat-value green">${g.active7d.length}</div><div class="stat-label">repos updated</div></div></div>
      <div class="timeline">${g.active7d.map(r=>`<div class="tl-item"><div><div class="tl-title">${esc(r.name)}</div><div class="tl-meta">${esc(r.description||'')}</div></div><div class="tl-meta">${r.language||''}</div></div>`).join('')}</div>
    ` : '<p style="font-size:13px;color:rgba(255,255,255,0.35)">No repo activity this week.</p>'}
  </div>`;
}

function rAll(c, g, y, l, u) {
  const lMax = Math.max(...Object.values(g.languages), 1);
  const pMax = Math.max(...y.playlists.map(p=>p.count), 1);
  return `
  <div class="section">
    <div class="section-title"><span class="icon">🌐</span> Connected Platforms</div>
    ${plat('💬','ChatGPT',`${c.total.toLocaleString()} conversations · ${c.memories} memories`, c.total.toLocaleString(),'blue')}
    ${plat('🐙','GitHub',`@${g.profile.username} · ${g.profile.followers} followers · ${g.publicRepos} public`, g.totalRepos,'green')}
    ${plat('▶️','YouTube',`${y.subscriptions} subs · ${y.likedVideos} liked · ${y.watchLater} watch later`, y.playlists.reduce((a,p)=>a+p.count,0),'rose')}
    ${plat('💼','LinkedIn',esc(l.profile.headline), l.totalConnections,'purple')}
    ${plat('🚗','Uber',`$${u.totalSpent} lifetime spend`, u.totalTrips,'amber')}
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title"><span class="icon">🐙</span> GitHub Languages</div>
    <div class="bar-chart">${Object.entries(g.languages).map(([lang,n])=>`
      <div class="bar-row"><div class="bar-label">${lang}</div><div class="bar-track"><div class="bar-fill" style="width:${(n/lMax*100).toFixed(0)}%;background:${LC[lang]||'#4af'}"></div></div><div class="bar-val">${n}</div></div>
    `).join('')}</div>
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title"><span class="icon">▶️</span> YouTube Playlists</div>
    <div class="bar-chart">${y.playlists.sort((a,b)=>b.count-a.count).map(p=>`
      <div class="bar-row"><div class="bar-label" title="${esc(p.title)}">${esc(p.title)}</div><div class="bar-track"><div class="bar-fill" style="width:${(p.count/pMax*100).toFixed(0)}%;background:#fb7185"></div></div><div class="bar-val">${p.count}</div></div>
    `).join('')}</div>
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title"><span class="icon">🎵</span> Top Liked Channels</div>
    <div class="topics">${Object.entries(y.topChannels).map(([ch,n])=>`<div class="topic">${esc(ch)} <span style="opacity:0.4">${n}</span></div>`).join('')}</div>
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title"><span class="icon">💼</span> Skills</div>
    <div class="topics">${l.skills.map(s=>`<div class="topic">${esc(s)}</div>`).join('')}</div>
  </div>`;
}

function plat(icon,name,detail,stat,color) {
  return `<div class="plat-row"><div class="plat-icon">${icon}</div><div class="plat-info"><div class="plat-name">${name}</div><div class="plat-detail">${detail}</div></div><div class="plat-stat ${color}">${stat}</div></div>`;
}

function modelBadges(models) {
  return Object.entries(models).map(([m,n])=>{
    const cls = m.includes('4o') ? 'gpt4o' : m.includes('5') ? 'gpt5' : 'o3';
    return `<div class="badge ${cls}">${m} <span class="n">${n}</span></div>`;
  }).join('');
}

render();
</script>
</body>
</html>
