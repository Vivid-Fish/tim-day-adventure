<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim's Week</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --warm: #f43f5e;
  --cool: #6366f1;
  --text: #fafafa;
  --muted: rgba(250,250,250,0.4);
  --faint: rgba(250,250,250,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.page { max-width: 480px; margin: 0 auto; padding: 0 24px; }

.label {
  font-size: 11px; font-weight: 500; letter-spacing: 1.5px;
  text-transform: uppercase; color: rgba(250,250,250,0.22);
}

/* Hero: pull quote */
.hero {
  padding: 72px 0 0;
  text-align: center;
}
.hero .label { margin-bottom: 24px; }
.hero-quote {
  font-size: 22px;
  font-weight: 300;
  line-height: 1.7;
  color: rgba(250,250,250,0.45);
  max-width: 380px;
  margin: 0 auto;
}
.hero-quote .warm { color: var(--warm); font-weight: 500; }
.hero-quote .cool { color: var(--cool); font-weight: 500; }
.stat-line {
  margin-top: 24px;
  font-size: 13px;
  color: rgba(250,250,250,0.18);
  letter-spacing: 0.5px;
}
.stat-line span {
  margin: 0 6px;
}

/* Section spacing */
.section { padding: 56px 0 0; }

/* Theme bars */
.theme-bars {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 16px;
}
.theme-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.theme-name {
  font-size: 13px;
  font-weight: 500;
  width: 140px;
  flex-shrink: 0;
  color: rgba(250,250,250,0.55);
}
.theme-track {
  flex: 1;
  height: 8px;
  background: var(--faint);
  border-radius: 4px;
  overflow: hidden;
}
.theme-fill {
  height: 100%;
  border-radius: 4px;
}
.theme-count {
  font-size: 13px;
  font-weight: 600;
  width: 28px;
  text-align: right;
  color: rgba(250,250,250,0.4);
}

/* Hour chart */
.hour-chart { position: relative; }
.hours {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 88px;
  margin: 16px 0 6px;
}
.hours .bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  position: relative;
  min-width: 0;
}
.hour-axis {
  display: flex;
  font-size: 9px;
  color: rgba(250,250,250,0.12);
  margin-bottom: 12px;
}
.hour-axis span { flex: 1; text-align: center; }
.hour-annotation {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
.hour-annotation strong { color: rgba(250,250,250,0.7); font-weight: 600; }

/* Model insight */
.model-insight {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.model-card {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(250,250,250,0.04);
}
.model-card:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.model-name {
  font-size: 14px;
  font-weight: 600;
  color: rgba(250,250,250,0.6);
}
.model-role {
  font-size: 13px;
  color: rgba(250,250,250,0.3);
}
.model-msgs {
  margin-left: auto;
  font-size: 12px;
  font-weight: 500;
  color: rgba(250,250,250,0.2);
}

/* Closing */
.closing {
  padding: 64px 0 0;
  text-align: center;
}
.closing-text {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.7;
  color: rgba(250,250,250,0.35);
  max-width: 360px;
  margin: 0 auto;
}
.closing-text strong {
  color: rgba(250,250,250,0.6);
  font-weight: 600;
}

/* Footer */
.footer {
  padding: 48px 0 40px;
  text-align: center;
  font-size: 11px;
  color: rgba(250,250,250,0.08);
}
</style>
</head>
<body>
<div class="page" id="page"><div style="padding:80px 0;text-align:center;color:rgba(250,250,250,0.15)">Loading...</div></div>
<script>
async function init() {
  const D = await (await fetch('/api/data')).json();
  const c = D.chatgpt;

  const now = new Date(D.generated);
  const weekAgo = new Date(now - 7*24*60*60*1000);
  const fmt = d => d.toLocaleDateString('en-US', {month:'short',day:'numeric'});

  const themes = c.themeCounts || {};
  const sorted = Object.entries(themes).sort((a,b) => b[1]-a[1]);
  const total = sorted.reduce((a,[,n]) => a+n, 0);

  const warmThemes = ['Baby & Parenting', 'Health & Wellness', 'Daily Life'];
  const coolThemes = ['AI & Engineering', 'Crypto / Web3', 'Work/Career'];

  // Hours
  const hours = c.hoursCT || {};
  const hMax = Math.max(...Object.values(hours).map(Number), 1);

  // Models
  const models = Object.entries(c.models).sort((a,b) => b[1]-a[1]);
  const mTotal = models.reduce((a,[,n]) => a+n, 0);

  // Find contrasting titles for hero
  const topPersonal = sorted.find(([t]) => warmThemes.includes(t));
  const topTechnical = sorted.find(([t]) => coolThemes.includes(t));
  const personalTitles = (c.themedTitles || {})[topPersonal?.[0]] || [];
  const technicalTitles = (c.themedTitles || {})[topTechnical?.[0]] || [];

  // Model role descriptions
  const modelRoles = {
    'gpt-4o': 'everyday questions',
    'gpt-5-4-thinking': 'extended reasoning',
    'o3': 'hard problems',
    'o4-mini': 'lightweight tasks',
    'gpt-4': 'general use',
    'gpt-4-turbo': 'general use',
  };

  let h = '';

  // === HERO: The juxtaposition ===
  const pTitle = personalTitles.length > 0 ? personalTitles[0] : null;
  const tTitle = technicalTitles.length > 0 ? technicalTitles[0] : null;

  h += `<div class="hero">`;
  h += `<div class="label">${fmt(weekAgo)} \u2013 ${fmt(now)}</div>`;
  if (pTitle && tTitle) {
    h += `<div class="hero-quote">
      In the same week you asked about
      <span class="warm">\u201c${esc(pTitle)}\u201d</span>
      and
      <span class="cool">\u201c${esc(tTitle)}\u201d</span>
    </div>`;
  } else {
    h += `<div class="hero-quote">${total} conversations with AI this week</div>`;
  }
  h += `<div class="stat-line">
    <span>${total} conversations</span>\u00b7
    <span>${models.length} models</span>\u00b7
    <span>${mTotal} messages</span>
  </div>`;
  h += `</div>`;

  // === MIDDLE: Theme breakdown ===
  h += `<div class="section"><div class="label">What you asked about</div>`;
  h += `<div class="theme-bars">`;
  for (const [theme, count] of sorted) {
    const maxCount = sorted[0][1];
    const pct = Math.round(count / maxCount * 100);
    const isWarm = warmThemes.includes(theme);
    const isCool = coolThemes.includes(theme);
    const color = isWarm ? 'var(--warm)' : isCool ? 'var(--cool)' : 'rgba(250,250,250,0.2)';
    const opacity = isWarm || isCool ? '0.6' : '0.5';
    h += `<div class="theme-row">
      <div class="theme-name">${esc(theme)}</div>
      <div class="theme-track"><div class="theme-fill" style="width:${pct}%;background:${color};opacity:${opacity}"></div></div>
      <div class="theme-count">${count}</div>
    </div>`;
  }
  h += `</div></div>`;

  // === MIDDLE: Hour chart (clean) ===
  h += `<div class="section"><div class="label">When you think</div>`;
  h += `<div class="hour-chart"><div class="hours">`;
  for (let hr = 0; hr < 24; hr++) {
    const v = Number(hours[hr] || 0);
    const pct = v > 0 ? Math.max(8, (v / hMax) * 100) : 2;
    const color = v === 0 ? 'var(--faint)' : 'var(--cool)';
    const opacity = v > 0 ? 0.25 + (v / hMax) * 0.55 : 1;
    h += `<div class="bar" style="height:${pct}%;background:${color};opacity:${opacity}"></div>`;
  }
  h += `</div>`;
  h += `<div class="hour-axis">${['12a','','','3a','','','6a','','','9a','','','12p','','','3p','','','6p','','','9p','','',''].map(l => `<span>${l}</span>`).join('')}</div>`;
  h += `<div class="hour-annotation">`;
  h += `Peak at <strong>${fmtH(c.peakHour)} CT</strong>.`;
  if (c.nightConvos > 0) {
    h += ` ${c.nightConvos} late-night session${c.nightConvos>1?'s':''} after 10pm.`;
  }
  h += `</div></div></div>`;

  // === MIDDLE: Models as insight ===
  if (models.length > 1) {
    h += `<div class="section"><div class="label">How you used AI</div>`;
    h += `<div class="model-insight">`;
    for (const [model, count] of models) {
      const role = modelRoles[model] || 'general use';
      h += `<div class="model-card">
        <div class="model-name">${esc(model)}</div>
        <div class="model-role">${role}</div>
        <div class="model-msgs">${count}</div>
      </div>`;
    }
    h += `</div></div>`;
  }

  // === CLOSING: Synthesis ===
  let warmCount = 0, coolCount = 0;
  for (const [t, n] of sorted) {
    if (warmThemes.includes(t)) warmCount += n;
    else if (coolThemes.includes(t)) coolCount += n;
  }
  const ratio = warmCount > coolCount ? 'more about life than work'
    : warmCount === coolCount ? 'equally about life and work'
    : 'more about work than life';
  h += `<div class="closing">
    <div class="closing-text">
      <strong>${total} conversations</strong> this week \u2014 ${ratio}. The same person, switching between both all day.
    </div>
  </div>`;

  // === FOOTER ===
  h += `<div class="footer">Data from Vana \u00b7 ${fmt(now)}, ${now.getFullYear()}</div>`;

  document.getElementById('page').innerHTML = h;
}

function fmtH(h) { return h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

init();
</script>
</body>
</html>
